<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Care Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surf:#ffffff;--text:#1a1a2e;--text2:#6b7280;
  --bdr:#e8e6e1;--acc:#6366f1;--acc-s:rgba(99,102,241,0.08);--acc-glow:rgba(99,102,241,0.25);
  --r:16px;--sh:0 2px 16px rgba(0,0,0,0.05);
  --font:'Outfit',system-ui,sans-serif;--font-d:'Fraunces',Georgia,serif;
  --sky-a:#fef3c7;--sky-b:#fde68a;
}
.dark{--bg:#0c0a1a;--surf:#1a1833;--text:#eee8f5;--text2:#8b83a0;--bdr:#2a2545;
  --acc-s:rgba(99,102,241,0.15);--sh:0 2px 20px rgba(0,0,0,0.3);
  --sky-a:#1e1b4b;--sky-b:#312e81}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100vh;transition:all 1.5s ease;overflow-x:hidden}

/* Sky */
.sky{position:fixed;top:0;left:0;right:0;height:320px;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,var(--sky-a) 0%,var(--sky-b) 40%,transparent 100%);
  transition:all 3s ease;opacity:0.7}

/* App shell */
.app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:16px 16px 140px}

/* Header */
.hdr{text-align:center;padding:28px 0 12px}
.hdr .avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--acc);
  margin:0 auto 10px;display:block;box-shadow:0 0 0 4px var(--acc-s)}
.hdr .avatar-placeholder{width:64px;height:64px;border-radius:50%;background:var(--acc-s);
  margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  border:3px solid var(--acc)}
.hdr h1{font-family:var(--font-d);font-size:1.65rem;font-weight:600;margin-bottom:2px}
.hdr .sub{color:var(--text2);font-size:0.88rem}
.hdr .clock{font-size:3rem;font-weight:700;letter-spacing:-2px;color:var(--acc);margin:4px 0;
  font-variant-numeric:tabular-nums}
.hdr .aff{font-style:italic;color:var(--text2);font-size:0.85rem;margin-top:4px;opacity:0.8}

/* Progress sun arc */
.sun-arc{width:100%;height:8px;background:var(--bdr);border-radius:99px;margin:12px 0 4px;overflow:hidden}
.sun-fill{height:100%;border-radius:99px;transition:width 1s ease;
  background:linear-gradient(90deg,#fbbf24,#f59e0b,#ea580c)}
.sun-lbl{text-align:center;font-size:0.78rem;color:var(--text2)}

/* Alert */
.alert{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:14px 20px;
  border-radius:var(--r);margin:12px 0;display:none;align-items:center;gap:12px;
  font-weight:600;box-shadow:0 4px 24px rgba(239,68,68,0.3);animation:pulse 2s ease infinite}
.alert.show{display:flex}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.005)}}
.alert button{background:rgba(255,255,255,0.25);border:none;color:#fff;padding:6px 14px;
  border-radius:8px;cursor:pointer;font-weight:600;font-family:var(--font)}

/* Nav */
.nav{display:flex;gap:3px;background:var(--surf);border-radius:var(--r);padding:4px;
  margin-bottom:16px;box-shadow:var(--sh);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-btn{flex:1;min-width:0;text-align:center;padding:10px 6px;border-radius:12px;font-weight:600;
  font-size:0.78rem;cursor:pointer;transition:all 0.2s;color:var(--text2);white-space:nowrap;
  border:none;background:none;font-family:var(--font)}
.nav-btn.on{background:var(--acc);color:#fff;box-shadow:0 2px 8px var(--acc-glow)}
.nav-btn:hover:not(.on){background:var(--acc-s)}
.page{display:none}.page.on{display:block}

/* Card */
.card{background:var(--surf);border-radius:var(--r);padding:16px;margin-bottom:10px;
  box-shadow:var(--sh);transition:all 0.25s;border-left:4px solid transparent}
.card:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,0.08)}

/* Task */
.task{cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.task.done{opacity:0.4}.task.skipped{opacity:0.3}
.task.overdue .card{border-left-color:#ef4444}
.task.next .card{border-left-color:var(--acc);background:var(--acc-s)}
.t-icon{font-size:1.4rem;width:32px;text-align:center;flex-shrink:0;padding-top:2px}
.t-body{flex:1;min-width:0}
.t-time{font-weight:700;font-size:0.92rem}
.t-title{font-size:0.88rem;color:var(--text)}
.t-cat{display:inline-block;font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:99px;
  margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.t-status{font-size:1rem;flex-shrink:0}
.t-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.t-steps{margin-top:10px;padding:10px;background:var(--bg);border-radius:10px;font-size:0.83rem;display:none}
.t-steps.open{display:block}
.t-steps ol{padding-left:18px}
.t-steps li{margin-bottom:2px}
.t-note{font-size:0.78rem;color:var(--text2);margin-top:3px;font-style:italic}
.note-row{display:flex;gap:5px;margin-top:6px}
.note-row input{flex:1;padding:6px 10px;border:1px solid var(--bdr);border-radius:8px;
  font-size:0.78rem;background:var(--bg);color:var(--text);font-family:var(--font)}

/* Quick add */
.quick-add{background:var(--surf);border-radius:var(--r);padding:14px;margin-bottom:14px;
  box-shadow:var(--sh);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.quick-add input,.quick-add select{padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;
  font-size:0.85rem;background:var(--bg);color:var(--text);font-family:var(--font)}
.quick-add input[type=time]{width:110px}
.quick-add input[type=text]{flex:1;min-width:120px}
.quick-add select{width:120px}

/* Buttons */
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font)}
.btn:active{transform:scale(0.95)}
.btn-g{background:#059669;color:#fff}.btn-y{background:#d97706;color:#fff}
.btn-o{background:var(--bdr);color:var(--text)}.btn-a{background:var(--acc);color:#fff}
.btn-a:hover{filter:brightness(1.1)}

/* Chat */
.chat-box{background:var(--surf);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.chat-head{padding:12px 16px;font-weight:700;border-bottom:1px solid var(--bdr);font-size:0.9rem}
.chat-msgs{height:380px;overflow-y:auto;padding:12px 16px}
.c-msg{margin-bottom:10px}
.c-msg.user{text-align:right}
.bbl{display:inline-block;max-width:85%;padding:8px 14px;border-radius:14px;font-size:0.85rem;line-height:1.45}
.c-msg.user .bbl{background:var(--acc);color:#fff;border-bottom-right-radius:4px}
.c-msg.ai .bbl{background:var(--bg);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.c-msg.system .bbl{background:var(--acc-s);font-size:0.8rem;color:var(--text2)}
.c-msg.action .bbl{background:#d1fae5;color:#065f46;font-size:0.8rem;font-weight:600}
.speak-btn:hover{opacity:1!important;transform:scale(1.2)}
.chat-in{display:flex;gap:8px;padding:10px;border-top:1px solid var(--bdr)}
.chat-in input{flex:1;padding:10px 14px;border:1px solid var(--bdr);border-radius:8px;
  font-size:0.88rem;background:var(--bg);color:var(--text);font-family:var(--font)}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:10px}
.cal-hd{text-align:center;font-size:0.7rem;font-weight:700;color:var(--text2);padding:4px}
.cal-day{text-align:center;padding:8px 2px;border-radius:8px;font-size:0.8rem;cursor:pointer;
  transition:all 0.15s;min-height:42px}
.cal-day:hover{background:var(--acc-s)}
.cal-day.today{background:var(--acc);color:#fff;font-weight:700}
.cal-day.has-event{position:relative}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;background:var(--acc)}
.cal-day.other{opacity:0.3}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cal-nav h3{font-size:0.95rem;font-weight:600}

/* Settings */
.s-group{background:var(--surf);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.s-group h3{font-size:0.88rem;font-weight:700;margin-bottom:10px;color:var(--acc)}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid var(--bdr);gap:8px}
.s-row:last-child{border:none}
.s-row label{font-size:0.83rem;font-weight:500;flex-shrink:0}
.s-row input,.s-row select{padding:7px 10px;border:1px solid var(--bdr);border-radius:8px;
  font-size:0.83rem;background:var(--bg);color:var(--text);font-family:var(--font);max-width:200px}
.s-row input[type=color]{width:44px;height:32px;padding:2px;cursor:pointer;border-radius:8px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
.dot-g{background:#059669}.dot-r{background:#dc2626}

/* Profile */
.prof-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--acc);
  display:block;margin:0 auto 12px;box-shadow:0 0 0 6px var(--acc-s)}
.prof-upload{text-align:center;margin-bottom:16px}
.prof-field{margin-bottom:10px}
.prof-field label{display:block;font-size:0.8rem;font-weight:600;color:var(--text2);margin-bottom:3px}
.prof-field textarea,.prof-field input{width:100%;padding:8px 10px;border:1px solid var(--bdr);
  border-radius:8px;font-size:0.85rem;background:var(--bg);color:var(--text);
  font-family:var(--font);resize:vertical}

/* Responsive */
@media(max-width:600px){
  .hdr .clock{font-size:2.2rem}
  .quick-add{flex-direction:column}
  .quick-add input,.quick-add select{width:100%}
}
</style></head>
<body>
<div class="sky" id="sky"></div>
<div class="app">
  <!-- Header -->
  <div class="hdr">
    <div id="avatar-area"></div>
    <h1 id="greeting"></h1>
    <div class="sub" id="sub-g"></div>
    <div class="clock" id="clock"></div>
    <div class="aff" id="aff"></div>
  </div>
  <div class="sun-arc"><div class="sun-fill" id="sun-fill"></div></div>
  <div class="sun-lbl" id="sun-lbl"></div>

  <div class="alert" id="alert">
    <span style="font-size:1.3rem">&#x1F514;</span>
    <span id="alert-text" style="flex:1"></span>
    <button onclick="document.getElementById('alert').classList.remove('show')">Got it</button>
  </div>

  <!-- Nav -->
  <div class="nav" id="nav">
    <button class="nav-btn on" data-p="home">&#x2600;&#xFE0F; Today</button>
    <button class="nav-btn" data-p="chat">&#x1F4AC; Chat</button>
    <button class="nav-btn" data-p="cal">&#x1F4C5; Calendar</button>
    <button class="nav-btn" data-p="profile">&#x1F464; Profile</button>
    <button class="nav-btn" data-p="settings">&#x2699;&#xFE0F; Settings</button>
  </div>

  <!-- Today -->
  <div class="page on" id="p-home">
    <div class="quick-add" id="quick-add">
      <input type="time" id="qa-time">
      <input type="text" id="qa-title" placeholder="Quick add a task...">
      <select id="qa-cat"><option value="custom">Task</option><option value="meal">Meal</option>
        <option value="bathroom">Bathroom</option><option value="medication">Medication</option>
        <option value="activity">Activity</option><option value="hydration">Hydration</option>
        <option value="appointment">Appointment</option></select>
      <button class="btn btn-a" id="qa-btn">+ Add</button>
    </div>
    <div id="task-list"></div>
  </div>

  <!-- Chat -->
  <div class="page" id="p-chat">
    <div class="chat-box">
      <div class="chat-head">&#x1F4AC; AI Care Assistant</div>
      <div class="chat-msgs" id="chat-msgs">
        <div class="c-msg system"><div class="bbl">Hi! I can modify your schedule, remember important info, and help you stay on track. Try: "Add a snack at 3pm" or "She started taking Synthroid"</div></div>
      </div>
      <div class="chat-in">
        <input id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button class="btn btn-a" id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="page" id="p-cal">
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-o" id="cal-prev">&larr;</button>
        <h3 id="cal-title"></h3>
        <button class="btn btn-o" id="cal-next">&rarr;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div style="margin-top:12px">
      <h3 style="font-size:0.9rem;margin-bottom:8px" id="cal-events-title">Events</h3>
      <div id="cal-events"></div>
      <div class="card" style="margin-top:10px">
        <h3 style="font-size:0.85rem;color:var(--acc);margin-bottom:8px">Add Event</h3>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input type="date" id="ev-date" style="padding:6px 8px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--font);background:var(--bg);color:var(--text)">
          <input type="time" id="ev-time" style="padding:6px 8px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--font);background:var(--bg);color:var(--text)">
          <input type="text" id="ev-title" placeholder="Event title" style="flex:1;min-width:120px;padding:6px 8px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--font);background:var(--bg);color:var(--text)">
          <button class="btn btn-a" id="ev-add">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile -->
  <div class="page" id="p-profile">
    <div class="card">
      <div class="prof-upload">
        <div id="prof-photo-area"></div>
        <input type="file" id="photo-input" accept="image/*" style="display:none">
        <button class="btn btn-o" id="photo-btn" style="margin-top:8px">Upload Photo</button>
      </div>
      <div class="prof-field"><label>About</label><textarea id="prof-bio" rows="2" placeholder="A little about them..."></textarea></div>
      <div class="prof-field"><label>Birthday</label><input type="date" id="prof-bday"></div>
      <div class="prof-field"><label>Favorites</label><textarea id="prof-fav" rows="2" placeholder="Favorite foods, activities, music..."></textarea></div>
      <div class="prof-field"><label>Medical Notes</label><textarea id="prof-med" rows="3" placeholder="Allergies, conditions, medications..."></textarea></div>
      <button class="btn btn-a" id="prof-save" style="width:100%;margin-top:8px;padding:10px">Save Profile</button>
    </div>
    <div class="card" style="margin-top:12px">
      <h3 style="font-size:0.88rem;color:var(--acc);margin-bottom:8px">&#x1F4DD; AI Memory</h3>
      <div id="memory-list" style="font-size:0.82rem;color:var(--text2)"></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="page" id="p-settings">
    <div class="s-group"><h3>People</h3>
      <div class="s-row"><label>Your name</label><input id="s-cn"></div>
      <div class="s-row"><label>Recipient name</label><input id="s-rn"></div>
      <div class="s-row"><label>Daily greeting</label><input id="s-gm" placeholder="Custom greeting..."></div>
    </div>
    <div class="s-group"><h3>Appearance</h3>
      <div class="s-row"><label>Theme</label>
        <select id="s-theme"><option value="auto">Auto (time of day)</option>
          <option value="light">Light</option><option value="dark">Dark</option></select></div>
      <div class="s-row"><label>Accent color</label><input type="color" id="s-acc"></div>
    </div>
    <div class="s-group"><h3>AI Provider</h3>
      <div class="s-row"><label>Provider</label>
        <select id="s-aip"><option value="ollama">Ollama (local)</option>
          <option value="openrouter">OpenRouter</option>
          <option value="anthropic">Anthropic</option></select></div>
      <div class="s-row"><label>Ollama model</label><input id="s-om" placeholder="llama3.2" style="width:130px"></div>
      <div class="s-row"><label>OpenRouter key</label><input id="s-ork" type="password" style="width:180px"></div>
      <div class="s-row"><label>OpenRouter model</label><input id="s-orm" placeholder="meta-llama/llama-3.1-8b-instruct:free" style="width:180px"></div>
      <div class="s-row"><label>Anthropic key</label><input id="s-ak" type="password" style="width:180px"></div>
    </div>
    <div class="s-group"><h3>Integrations</h3><div id="s-status"></div></div>
    <div class="s-group"><h3>TTS Voice</h3>
      <div id="tts-info"></div>
      <div class="s-row"><label>Auto-read chat</label>
        <select id="s-autoread"><option value="true">On</option><option value="false">Off</option></select></div>
      <button class="btn btn-a" id="tts-test" style="margin-top:6px">Test Voice</button>
    </div>
    <div class="s-group"><h3>Updates</h3>
      <div class="s-row"><label>Update URL</label><input id="s-upurl" placeholder="https://raw.githubusercontent.com/..." style="width:220px"></div>
      <div id="update-status" style="padding:8px 0;font-size:0.85rem;color:var(--text2)"></div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="btn btn-a" id="btn-check-update">Check for Updates</button>
        <button class="btn btn-g" id="btn-apply-update" style="display:none">Apply Update</button>
      </div>
      <div style="font-size:0.78rem;color:var(--text2);margin-top:8px" id="version-info"></div>
    </div>
    <button class="btn btn-a" id="s-save" style="width:100%;padding:12px;font-size:0.95rem;margin-top:4px">Save Settings</button>
  </div>
</div>

<script>
// ── State ──
let tasks=[],config={},events=[],profile={},calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),expanded=null;

// ── Audio ──
let aC=null;
function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)()}
function beep(f,ms){initA();const o=aC.createOscillator(),g=aC.createGain();o.connect(g);g.connect(aC.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.3,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+ms/1000);o.start();o.stop(aC.currentTime+ms/1000)}
document.addEventListener('click',initA,{once:true});

// ── Nav ──
document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
    document.getElementById('p-'+this.dataset.p).classList.add('on');
    if(this.dataset.p==='cal'){loadEvents();renderCal()}
    if(this.dataset.p==='profile')loadProfile();
    if(this.dataset.p==='settings')loadSettings();
  });
});

// ── Theme ──
function applyTheme(){
  const h=new Date().getHours();
  const dark=config.theme==='dark'||(config.theme==='auto'&&(h>=20||h<6));
  document.body.classList.toggle('dark',dark);
  if(config.accent_color)document.documentElement.style.setProperty('--acc',config.accent_color);
  const sky=document.getElementById('sky');
  if(h>=5&&h<8){sky.style.background='linear-gradient(180deg,#fde68a 0%,#fed7aa 30%,transparent 100%)'}
  else if(h>=8&&h<17){sky.style.background='linear-gradient(180deg,#bae6fd 0%,#e0f2fe 40%,transparent 100%)'}
  else if(h>=17&&h<20){sky.style.background='linear-gradient(180deg,#c4b5fd 0%,#fecaca 30%,transparent 100%)'}
  else{sky.style.background='linear-gradient(180deg,#1e1b4b 0%,#312e81 30%,transparent 100%)'}
}

function updateHeader(){
  const h=new Date().getHours();const n=config.caregiver_name||'';const rn=config.recipient_name||'your loved one';
  let g=config.greeting_message||'';
  if(!g){
    if(h<12)g='Good morning'+(n?', '+n:'');
    else if(h<17)g='Good afternoon'+(n?', '+n:'');
    else if(h<21)g='Good evening'+(n?', '+n:'');
    else g='Night shift'+(n?', '+n:'');
  }
  document.getElementById('greeting').textContent=g;
  document.getElementById('sub-g').textContent='Caring for '+rn;
  // Avatar
  const aa=document.getElementById('avatar-area');
  if(profile.photo_path){
    aa.innerHTML='<img class="avatar" src="/uploads/'+profile.photo_path+'" alt="">';
  } else {
    aa.innerHTML='<div class="avatar-placeholder">'+((rn||'?')[0].toUpperCase())+'</div>';
  }
}

function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function updateSun(){
  const total=tasks.length,done=tasks.filter(t=>t.done||t.skipped).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('sun-fill').style.width=pct+'%';
  document.getElementById('sun-lbl').textContent=done+' of '+total+' complete ('+pct+'%)';
}

// ── Tasks ──
async function loadTasks(){
  const r=await fetch('/api/tasks');const d=await r.json();tasks=d.tasks;
  renderTasks();updateSun();
}

function renderTasks(){
  const now=new Date(),nowStr=now.toTimeString().slice(0,5);
  const el=document.getElementById('task-list');
  const upcoming=tasks.filter(t=>!t.done&&!t.skipped&&t.time>=nowStr);
  const nextId=upcoming.length?upcoming[0].id:null;
  let html='';
  tasks.forEach(t=>{
    let cls='task',st='';
    if(t.done){cls+=' done';st='\u2705'}
    else if(t.skipped){cls+=' skipped';st='\u23ED\uFE0F'}
    else if(t.time<=nowStr){cls+=' overdue';st='\u26A0\uFE0F'}
    else if(t.id===nextId){cls+=' next';st='\u25B6\uFE0F'}
    const steps=t.steps&&t.steps.length?'<div class="t-steps'+(expanded===t.id?' open':'')+'"><ol>'+t.steps.map(s=>'<li>'+s+'</li>').join('')+'</ol></div>':'';
    const note=t.notes?'<div class="t-note">\uD83D\uDCDD '+t.notes+'</div>':'';
    let acts='';
    if(!t.done&&!t.skipped){
      acts='<div class="t-actions"><button class="btn btn-g" data-do="done" data-id="'+t.id+'">\u2705 Done</button><button class="btn btn-y" data-do="skip" data-id="'+t.id+'">\u23ED Skip</button></div><div class="note-row"><input class="ni" data-id="'+t.id+'" placeholder="Add note..."><button class="btn btn-o" data-do="note" data-id="'+t.id+'">\uD83D\uDCDD</button></div>';
    } else {
      acts='<div class="t-actions"><button class="btn btn-o" data-do="undo" data-id="'+t.id+'">\u21A9 Undo</button></div>';
    }
    html+='<div class="'+cls+'"><div class="card" data-tid="'+t.id+'" style="display:flex;gap:12px;align-items:flex-start;width:100%"><div class="t-icon">'+t.icon+'</div><div class="t-body"><div class="t-time">'+t.time12+'</div><div class="t-title">'+t.title+'</div><span class="t-cat" style="background:'+t.color+'18;color:'+t.color+'">'+t.category_label+'</span>'+note+acts+steps+'</div><div class="t-status">'+st+'</div></div></div>';
  });
  el.innerHTML=html;
  // Events
  el.querySelectorAll('[data-do]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();
      const a=b.dataset.do,id=b.dataset.id;
      if(a==='done')post('/api/task/done',{task_id:id});
      else if(a==='skip')post('/api/task/skip',{task_id:id});
      else if(a==='undo')post('/api/task/undo',{task_id:id});
      else if(a==='note'){const i=el.querySelector('.ni[data-id="'+id+'"]');if(i&&i.value.trim())post('/api/task/note',{task_id:id,notes:i.value.trim()})}
    });
  });
  el.querySelectorAll('.ni').forEach(i=>i.addEventListener('click',e=>e.stopPropagation()));
  el.querySelectorAll('.card[data-tid]').forEach(c=>c.addEventListener('click',()=>{
    expanded=expanded===c.dataset.tid?null:c.dataset.tid;renderTasks();}));
}

async function post(url,body){
  await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  loadTasks();
}

// ── Chat ──
document.getElementById('chat-send').addEventListener('click',sendChat);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});
async function sendChat(){
  const inp=document.getElementById('chat-input');const msg=inp.value.trim();if(!msg)return;
  inp.value='';addMsg('user',msg);addMsg('ai','\u23F3 Thinking...');
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
  const d=await r.json();
  document.getElementById('chat-msgs').removeChild(document.getElementById('chat-msgs').lastChild);
  addMsg('ai',d.response,true);
  if(d.actions&&d.actions.length){d.actions.forEach(a=>addMsg('action','\u2705 '+a));loadTasks();}
}
function addMsg(role,text,canSpeak){
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className='c-msg '+role;
  let speakBtn='';
  if(role==='ai'&&canSpeak){
    speakBtn='<button class="speak-btn" title="Read aloud" style="background:none;border:none;cursor:pointer;font-size:0.9rem;margin-left:6px;opacity:0.6" data-speak>&#x1F50A;</button>';
    // Auto-read if enabled
    if(config.auto_read_chat){
      fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
    }
  }
  d.innerHTML='<div class="bbl">'+text+speakBtn+'</div>';
  // Attach speak button handler
  const btn=d.querySelector('[data-speak]');
  if(btn){btn.addEventListener('click',()=>{
    fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
  })}
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

// ── Calendar ──
async function loadEvents(){const r=await fetch('/api/events');events=(await r.json()).events||[]}

function renderCal(){
  const grid=document.getElementById('cal-grid');
  const title=document.getElementById('cal-title');
  const d=new Date(calYear,calMonth,1);
  title.textContent=d.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const startDay=d.getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();const todayStr=today.toISOString().slice(0,10);
  let html='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+='<div class="cal-hd">'+d+'</div>');
  // Previous month padding
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=startDay-1;i>=0;i--) html+='<div class="cal-day other">'+(prevDays-i)+'</div>';
  // Current month
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const hasEvt=events.some(e=>e.date===ds);
    html+='<div class="cal-day'+(isToday?' today':'')+(hasEvt?' has-event':'')+'" data-date="'+ds+'">'+day+'</div>';
  }
  // Next month padding
  const totalCells=startDay+daysInMonth;const remaining=7-(totalCells%7);
  if(remaining<7)for(let i=1;i<=remaining;i++)html+='<div class="cal-day other">'+i+'</div>';
  grid.innerHTML=html;
  // Click handler
  grid.querySelectorAll('.cal-day:not(.other)').forEach(c=>c.addEventListener('click',()=>{
    const dt=c.dataset.date;if(dt)showDayEvents(dt)}));
  showDayEvents(todayStr);
}

function showDayEvents(dateStr){
  const el=document.getElementById('cal-events');
  const title=document.getElementById('cal-events-title');
  const dayEvts=events.filter(e=>e.date===dateStr);
  title.textContent='Events for '+new Date(dateStr+'T12:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  if(!dayEvts.length){el.innerHTML='<div class="card" style="font-size:0.85rem;color:var(--text2)">No events</div>';return}
  el.innerHTML=dayEvts.map((e,i)=>'<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+(e.time?fmt12(e.time)+' — ':'')+e.title+'</strong>'+(e.notes?'<div style="font-size:0.8rem;color:var(--text2)">'+e.notes+'</div>':'')+'</div><button class="btn btn-o" data-eidx="'+events.indexOf(e)+'">Remove</button></div>').join('');
  el.querySelectorAll('[data-eidx]').forEach(b=>b.addEventListener('click',async()=>{
    await fetch('/api/events/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:parseInt(b.dataset.eidx)})});
    await loadEvents();renderCal();
  }));
}

function fmt12(t24){try{const[h,m]=t24.split(':').map(Number);return(h%12||12)+':'+String(m).padStart(2,'0')+' '+(h<12?'AM':'PM')}catch(e){return t24}}

document.getElementById('cal-prev').addEventListener('click',()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()});
document.getElementById('cal-next').addEventListener('click',()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCal()});
document.getElementById('ev-add').addEventListener('click',async()=>{
  const date=document.getElementById('ev-date').value;
  const time=document.getElementById('ev-time').value;
  const title=document.getElementById('ev-title').value.trim();
  if(!date||!title){alert('Date and title required');return}
  await fetch('/api/events/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,time,title,category:'appointment'})});
  document.getElementById('ev-title').value='';
  await loadEvents();renderCal();
});

// ── Profile ──
async function loadProfile(){
  const r=await fetch('/api/profile');profile=await r.json();
  const pa=document.getElementById('prof-photo-area');
  if(profile.photo_path)pa.innerHTML='<img class="prof-photo" src="/uploads/'+profile.photo_path+'">';
  else pa.innerHTML='<div class="prof-photo" style="background:var(--acc-s);display:flex;align-items:center;justify-content:center;font-size:2.5rem">'+((config.recipient_name||'?')[0].toUpperCase())+'</div>';
  document.getElementById('prof-bio').value=profile.bio||'';
  document.getElementById('prof-bday').value=profile.birthday||'';
  document.getElementById('prof-fav').value=profile.favorites||'';
  document.getElementById('prof-med').value=profile.medical_notes||'';
  // Memory
  const mr=await fetch('/api/memory');const mem=await mr.json();
  const ml=document.getElementById('memory-list');
  if(mem.notes&&mem.notes.length){
    ml.innerHTML=mem.notes.slice(-15).reverse().map(n=>'<div style="padding:3px 0;border-bottom:1px solid var(--bdr)">\u2022 '+n.text+' <span style="opacity:0.5">('+n.time.slice(0,10)+')</span></div>').join('');
  } else ml.innerHTML='<div>No memories yet. Chat with the AI to build memory.</div>';
}
document.getElementById('photo-btn').addEventListener('click',()=>document.getElementById('photo-input').click());
document.getElementById('photo-input').addEventListener('change',async function(){

  const fd=new FormData();fd.append('photo',this.files[0]);

  loadProfile();updateHeader();
});

    bio:document.getElementById('prof-bio').value,

  document.getElementById('s-rn').value=config.recipient_name||'';

  document.getElementById('s-om').value=config.ollama_model||'';
  document.getElementById('s-ork').value=config.openrouter_key||'';
  document.getElementById('s-orm').value=config.openrouter_model||'';
  document.getElementById('s-ak').value=config.anthropic_key||'';
  document.getElementById('s-autoread').value=config.auto_read_chat===false?'false':'true';

}

// ── Updates ──
let pendingUpdateFiles=[];
document.getElementById('btn-check-update').addEventListener('click',async()=>{
  const el=document.getElementById('update-status');
  el.textContent='Checking...';
  const r=await fetch('/api/update/check',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  const d=await r.json();
  el.textContent=d.message;
  if(d.available){
    el.innerHTML='<strong style="color:var(--acc)">Update available: v'+d.latest+'</strong><br>'+d.message;
    document.getElementById('btn-apply-update').style.display='inline-flex';
    pendingUpdateFiles=d.files||[];
  } else {
    document.getElementById('btn-apply-update').style.display='none';
  }
});
document.getElementById('btn-apply-update').addEventListener('click',async()=>{
  if(!confirm('This will download and replace app files. Continue?'))return;
  const el=document.getElementById('update-status');
  el.textContent='Downloading update...';
  const r=await fetch('/api/update/apply',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({files:pendingUpdateFiles})});
  const d=await r.json();
  el.textContent=d.message;
  document.getElementById('btn-apply-update').style.display='none';
  if(d.ok)el.innerHTML+='<br><strong>Restart the app to apply.</strong>';
});
